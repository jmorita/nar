    const MAX_SIMUL = 3 || 1;
    const WAIT_MS = 5000;

    window.onload = () => {
        setTimeout(() => run(0), 0);
    };

    function run(current) {
        const remaining = partners.length - current;
        const fragment = new DocumentFragment();
        for (let i = 0; i < MAX_SIMUL && i < remaining; ++i) {
            const partner = partners[current + i];
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = partner.url.trim();
            const element = tempDiv.firstChild;
            fragment.appendChild(element);
        }

        document.body.appendChild(fragment);

        if (MAX_SIMUL < remaining) {
            setTimeout(run.bind(this, current + MAX_SIMUL), WAIT_MS);
        }
    }
